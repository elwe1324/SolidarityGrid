services:
  postgres:
    image: postgres:16-alpine
    container_name: solidarity_postgres
    environment:
      POSTGRES_DB: solidarity_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d solidarity_db"]
      interval: 2s
      timeout: 3s
      retries: 5

  node-a:
    build:
      context: ./src/SolidarityGrid.Node
      dockerfile: Dockerfile
    container_name: node-a
    environment:
      - NODE_ID=Nodo-A
      - ConnectionStrings__Default=Host=postgres;Database=solidarity_db;Username=user;Password=password
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  node-b:
    build:
      context: ./src/SolidarityGrid.Node
      dockerfile: Dockerfile
    container_name: node-b
    environment:
      - NODE_ID=Nodo-B
      - ConnectionStrings__Default=Host=postgres;Database=solidarity_db;Username=user;Password=password
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

  node-c:
    build:
      context: ./src/SolidarityGrid.Node
      dockerfile: Dockerfile
    container_name: node-c
    environment:
      - NODE_ID=Nodo-C
      - ConnectionStrings__Default=Host=postgres;Database=solidarity_db;Username=user;Password=password
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy